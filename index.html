<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0ece4;color:#2a2a2a;min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
.header{padding:2.5rem 2rem 2rem;max-width:820px;margin:0 auto;}
.tag{display:inline-block;background:#E8730C;color:#fff;font-size:10px;font-weight:700;letter-spacing:.12em;padding:3px 10px;border-radius:4px;margin-bottom:1rem;text-transform:uppercase;}

.header h1 em{font-style:normal;color:#E8730C;}
.header p{font-size:13.5px;color:#666;line-height:1.65;max-width:480px;}

/* ── BARRA SUPERIOR (placar + filtros num scroll horizontal) ── */
.topbar{position:sticky;top:0;z-index:10;background:#e8e2d8;border-bottom:1px solid rgba(0,0,0,.08);}
.placar{display:flex;gap:0;padding:.75rem 2rem;align-items:center;max-width:820px;margin:0 auto;}
.pg{display:flex;flex-direction:column;align-items:flex-start;padding-right:1.5rem;margin-right:1.5rem;border-right:1px solid rgba(0,0,0,.1);}
.pg:last-of-type{border-right:none;}
.pg .v{font-size:17px;font-weight:700;color:#E8730C;line-height:1;}
.pg .l{font-size:10px;color:#888;margin-top:2px;letter-spacing:.04em;}
.pg-reset{margin-left:auto;font-size:11px;color:#999;background:none;border:none;cursor:pointer;letter-spacing:.04em;padding:4px 0;}
.pg-reset:hover{color:#E8730C;}

.filtros{overflow-x:auto;padding:.625rem 2rem;display:flex;gap:6px;scrollbar-width:none;max-width:820px;margin:0 auto;}
.filtros::-webkit-scrollbar{display:none;}
.filtro-btn{flex-shrink:0;padding:5px 13px;border-radius:4px;border:1px solid rgba(0,0,0,.15);background:transparent;color:#777;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.filtro-btn.active{background:#E8730C;border-color:#E8730C;color:#fff;}
.filtro-btn:hover:not(.active){border-color:rgba(232,115,12,.6);color:#E8730C;}

/* ── MODO TOGGLE ── */
.modo-wrap{max-width:820px;margin:1.5rem auto 0;padding:0 2rem;}
.modo-toggle{display:inline-flex;background:rgba(0,0,0,.07);border-radius:6px;padding:3px;}
.modo-btn{padding:6px 16px;border-radius:4px;border:none;background:transparent;color:#888;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.02em;}
.modo-btn.active{background:#1B2A4A;color:#fff;}

/* ── CONTEÚDO ── */
.content{max-width:820px;margin:0 auto;padding:1.5rem 2rem 3rem;}

/* ── BLOCO POR MATÉRIA ── */
.materia-bloco{margin-bottom:2.25rem;}
.mat-titulo{display:flex;align-items:center;gap:.625rem;margin-bottom:.875rem;padding-bottom:.625rem;border-bottom:1px solid rgba(0,0,0,.08);}
.mat-titulo h2{font-size:13px;font-weight:600;color:#888;letter-spacing:.04em;text-transform:uppercase;}
.mat-badge{font-size:10px;color:#E8730C;font-weight:600;}
.mat-progress{flex:1;height:2px;background:rgba(0,0,0,.1);border-radius:2px;}
.mat-progress-fill{height:100%;background:#E8730C;border-radius:2px;transition:width .35s;}

/* ── CARD PEGADINHA ── */
.pegadinha-card{border-bottom:1px solid rgba(0,0,0,.08);transition:background .15s;}
.pegadinha-card:last-child{border-bottom:none;}
.pegadinha-card.vista .card-num{background:#E8730C;color:#fff;border-color:#E8730C;}

.card-header{padding:.875rem 0;cursor:pointer;display:flex;align-items:center;gap:.875rem;}
.card-num{width:24px;height:24px;border-radius:50%;border:1px solid rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:rgba(0,0,0,.3);flex-shrink:0;transition:all .2s;}
.card-titulo{font-size:13.5px;color:#333;flex:1;line-height:1.45;}
.card-arrow{color:rgba(0,0,0,.3);transition:transform .2s;font-size:11px;flex-shrink:0;}
.pegadinha-card.open .card-arrow{transform:rotate(180deg);}

.card-body{display:none;padding-bottom:1.25rem;padding-left:2.375rem;}
.pegadinha-card.open .card-body{display:block;}

.row-errado{margin-bottom:.625rem;}
.row-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.3rem;}
.row-label.err{color:rgba(232,115,12,.7);}
.row-label.ok{color:rgba(100,160,220,.7);}
.row-texto{font-size:13px;line-height:1.7;color:#444;background:rgba(0,0,0,.03);border-left:2px solid rgba(232,115,12,.3);padding:.625rem .875rem;border-radius:0 4px 4px 0;}
.row-texto.certo{border-left-color:rgba(60,120,200,.4);color:#2a4a7a;}
.dica-txt{font-size:11.5px;color:#999;margin-top:.5rem;font-style:italic;padding-left:.25rem;}

/* ── QUIZ ── */
.quiz-container{max-width:600px;margin:0 auto;}
.quiz-prog-row{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;}
.quiz-prog-bar{flex:1;height:2px;background:rgba(0,0,0,.1);border-radius:2px;}
.quiz-prog-fill{height:100%;background:#E8730C;border-radius:2px;transition:width .3s;}
.quiz-prog-label{font-size:11px;color:#999;}

.quiz-card-wrap{animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.quiz-mat-tag{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#E8730C;display:block;margin-bottom:.875rem;}
.quiz-enunciado{font-size:15px;font-weight:600;color:#1B2A4A;line-height:1.6;margin-bottom:1.25rem;}
.quiz-enunciado em{font-style:normal;color:#b85c00;}

.quiz-opts-wrap{display:flex;flex-direction:column;gap:.5rem;}
.qopt{padding:.875rem 1rem;border-radius:6px;border:1px solid rgba(0,0,0,.12);background:rgba(0,0,0,.02);color:#555;font-size:13px;cursor:pointer;text-align:left;transition:all .15s;line-height:1.55;display:flex;gap:.875rem;align-items:flex-start;}
.qopt:hover:not([disabled]){border-color:#E8730C;color:#1B2A4A;}
.opt-letter{width:22px;height:22px;border-radius:50%;border:1px solid rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.qopt.certa{background:rgba(30,80,55,.35);border-color:rgba(60,150,90,.4);color:rgba(140,220,170,.9);}
.qopt.certa .opt-letter{background:rgba(60,150,90,.5);border-color:transparent;color:#fff;}
.qopt.errada{background:rgba(120,40,30,.2);border-color:rgba(200,80,60,.35);color:rgba(220,130,110,.85);}
.qopt.errada .opt-letter{background:rgba(180,60,40,.4);border-color:transparent;color:#fff;}

.quiz-fb{margin-top:.875rem;font-size:12.5px;line-height:1.65;padding:.75rem 1rem;border-radius:6px;display:none;border-left:3px solid;}
.quiz-fb.show{display:block;}
.quiz-fb.ok{background:rgba(30,80,55,.2);border-color:rgba(60,150,90,.5);color:rgba(140,220,170,.8);}
.quiz-fb.nao{background:rgba(120,40,30,.15);border-color:rgba(232,115,12,.4);color:rgba(232,175,120,.8);}

.btn-prox{margin-top:1rem;padding:8px 20px;background:#E8730C;color:#fff;border:none;border-radius:5px;font-size:13px;font-weight:600;cursor:pointer;display:none;}
.btn-prox:hover{background:#c85f00;}
.btn-prox.show{display:inline-block;}

.resultado-wrap{text-align:center;padding:2rem 0;animation:fadeIn .2s;}
.resultado-pct{font-size:56px;font-weight:700;color:#E8730C;line-height:1;}
.resultado-sub{font-size:13px;color:#888;margin:.5rem 0 1rem;}
.resultado-msg{font-size:13.5px;color:#666;line-height:1.7;max-width:400px;margin:0 auto 1.5rem;}
.btn-retry{padding:8px 20px;border:1px solid rgba(232,115,12,.5);color:#E8730C;background:transparent;border-radius:5px;font-size:13px;cursor:pointer;}
.btn-retry:hover{background:#E8730C;color:#fff;}

/* ── FOOTER ── */
.footer{text-align:center;padding:1.5rem 2rem;color:#aaa;font-size:11.5px;border-top:1px solid rgba(0,0,0,.08);max-width:820px;margin:0 auto;}
.footer span{color:#E8730C;}

@media(max-width:560px){
  .header,.placar,.filtros,.modo-wrap,.content{padding-left:1.25rem;padding-right:1.25rem;}
}
</style>
</head>

      {

// ── STATE ──────────────────────────────────────────────
let vistas=new Set(),acertosQuiz=0,errosQuiz=0,modoAtual='estudo',matFiltro='todas',quizFila=[],quizIdx=0;

// ── INIT ───────────────────────────────────────────────
function init(){
  buildFiltros();
  renderEstudo();
  buildQuizFila();
}

function buildFiltros(){
  const c=document.getElementById('filtros');
  [{id:'todas',nome:'Todas',emoji:'🔥'},...MATERIAS].forEach(m=>{
    const b=document.createElement('button');
    b.className='filtro-btn'+(m.id==='todas'?' active':'');
    b.dataset.mat=m.id;
    b.textContent=m.emoji+' '+m.nome;
    b.onclick=()=>setFiltro(m.id);
    c.appendChild(b);
  });
}

function setFiltro(id){
  matFiltro=id;
  document.querySelectorAll('.filtro-btn').forEach(b=>b.classList.toggle('active',b.dataset.mat===id));
  if(modoAtual==='estudo') renderEstudo();
  else{buildQuizFila();renderQuiz();}
}

function setModo(m){
  modoAtual=m;
  document.getElementById('btnEstudo').classList.toggle('active',m==='estudo');
  document.getElementById('btnQuiz').classList.toggle('active',m==='quiz');
  document.getElementById('viewEstudo').style.display=m==='estudo'?'block':'none';
  document.getElementById('viewQuiz').style.display=m==='quiz'?'block':'none';
  if(m==='quiz'){buildQuizFila();renderQuiz();}
}

// ── MODO ESTUDO ────────────────────────────────────────
function renderEstudo(){
  const view=document.getElementById('viewEstudo');
  const mats=matFiltro==='todas'?MATERIAS:MATERIAS.filter(m=>m.id===matFiltro);
  view.innerHTML='';
  mats.forEach(mat=>{
    const total=mat.pegadinhas.length;
    const vN=mat.pegadinhas.filter((_,i)=>vistas.has(mat.id+'_'+i)).length;
    const pct=total?Math.round(vN/total*100):0;

    const bloco=document.createElement('div');
    bloco.className='materia-bloco';
    bloco.innerHTML=`<div class="mat-titulo">
      <span style="font-size:15px">${mat.emoji}</span>
      <h2>${mat.nome}</h2>
      <span class="mat-badge">${vN}/${total}</span>
      <div class="mat-progress"><div class="mat-progress-fill" id="prog_${mat.id}" style="width:${pct}%"></div></div>
    </div>`;

    mat.pegadinhas.forEach((p,i)=>{
      const key=mat.id+'_'+i;
      const card=document.createElement('div');
      card.className='pegadinha-card'+(vistas.has(key)?' vista':'');
      card.innerHTML=`<div class="card-header">
        <div class="card-num">${String(i+1).padStart(2,'0')}</div>
        <div class="card-titulo">${p.titulo}</div>
        <div class="card-arrow">▾</div>
      </div>
      <div class="card-body">
        <div class="row-errado">
          <div class="row-label err">🚫 O que a FGV coloca</div>
          <div class="row-texto">${p.errado}</div>
        </div>
        <div>
          <div class="row-label ok">✓ A resposta certa</div>
          <div class="row-texto certo">${p.certo}</div>
        </div>
        ${p.dica?`<div class="dica-txt">💡 ${p.dica}</div>`:''}
      </div>`;

      card.querySelector('.card-header').onclick=()=>{
        const isOpen=card.classList.contains('open');
        card.classList.toggle('open',!isOpen);
        if(!isOpen){
          vistas.add(key);
          card.classList.add('vista');
          updatePlacar();
          const vN2=mat.pegadinhas.filter((_,j)=>vistas.has(mat.id+'_'+j)).length;
          const pf=document.getElementById('prog_'+mat.id);
          if(pf) pf.style.width=Math.round(vN2/total*100)+'%';
          const badge=bloco.querySelector('.mat-badge');
          if(badge) badge.textContent=vN2+'/'+total;
        }
      };
      bloco.appendChild(card);
    });
    view.appendChild(bloco);
  });
}

// ── MODO QUIZ ──────────────────────────────────────────
function buildQuizFila(){
  const mats=matFiltro==='todas'?MATERIAS:MATERIAS.filter(m=>m.id===matFiltro);
  quizFila=[];
  mats.forEach(mat=>mat.pegadinhas.forEach((p,i)=>quizFila.push({mat:mat.nome,emoji:mat.emoji,p,key:mat.id+'_'+i})));
  for(let i=quizFila.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[quizFila[i],quizFila[j]]=[quizFila[j],quizFila[i]];}
  quizIdx=0;
}

function renderQuiz(){
  const view=document.getElementById('viewQuiz');
  if(quizIdx>=quizFila.length){
    const tot=acertosQuiz+errosQuiz||1;
    const pct=Math.round(acertosQuiz/tot*100);
    const msg=pct>=80?'Excelente! A FGV não vai te pegar nessa.':pct>=60?'Bom resultado. Revise as que errou e refaça o quiz.':'Ainda tem margem para melhorar. Revise no Modo Estudo e tente novamente.';
    view.innerHTML=`<div class="quiz-container"><div class="resultado-wrap">
      <div class="resultado-pct">${pct}%</div>
      <div class="resultado-sub">${acertosQuiz} acertos de ${acertosQuiz+errosQuiz} questões</div>
      <div class="resultado-msg">${msg}</div>
      <button class="btn-retry" onclick="buildQuizFila();acertosQuiz=0;errosQuiz=0;updatePlacar();renderQuiz()">↺ Refazer quiz</button>
    </div></div>`;
    return;
  }
  const item=quizFila[quizIdx];
  const p=item.p;
  const shuffled=[{texto:p.errado,certa:false},{texto:p.certo,certa:true}].sort(()=>Math.random()-.5);
  const prog=Math.round(quizIdx/quizFila.length*100);
  view.innerHTML=`<div class="quiz-container">
    <div class="quiz-prog-row">
      <div class="quiz-prog-bar"><div class="quiz-prog-fill" style="width:${prog}%"></div></div>
      <span class="quiz-prog-label">${quizIdx+1} / ${quizFila.length}</span>
    </div>
    <div class="quiz-card-wrap">
      <span class="quiz-mat-tag">${item.emoji} ${item.mat}</span>
      <div class="quiz-enunciado">Qual afirmação sobre <em>"${p.titulo}"</em> está correta?</div>
      <div class="quiz-opts-wrap">
        ${shuffled.map((o,i)=>`<button class="qopt" data-certa="${o.certa}" onclick="responderQuiz(this)">
          <span class="opt-letter">${['A','B'][i]}</span>
          <span>${o.texto}</span>
        </button>`).join('')}
      </div>
      <div class="quiz-fb" id="qfb"></div>
      <button class="btn-prox" id="qnext" onclick="quizIdx++;renderQuiz()">Próxima →</button>
    </div>
  </div>`;
}

function responderQuiz(btn){
  const certa=btn.dataset.certa==='true';
  document.querySelectorAll('.qopt').forEach(b=>{b.disabled=true;b.classList.add(b.dataset.certa==='true'?'certa':'errada');});
  const item=quizFila[quizIdx];
  const fb=document.getElementById('qfb');
  if(certa){acertosQuiz++;fb.className='quiz-fb show ok';fb.textContent='✓ Correto! '+item.p.dica;}
  else{errosQuiz++;fb.className='quiz-fb show nao';fb.textContent='✗ Incorreto. '+item.p.dica;}
  vistas.add(item.key);
  updatePlacar();
  document.getElementById('qnext').className='btn-prox show';
}

function updatePlacar(){
  document.getElementById('pgVistas').textContent=vistas.size;
  document.getElementById('pgAcertos').textContent=acertosQuiz;
  document.getElementById('pgErros').textContent=errosQuiz;
  const tot=acertosQuiz+errosQuiz;
  document.getElementById('pgTotal').textContent=tot?Math.round(acertosQuiz/tot*100)+'%':'—';
}

function resetarTudo(){
  vistas.clear();acertosQuiz=0;errosQuiz=0;updatePlacar();buildQuizFila();
  if(modoAtual==='estudo') renderEstudo();
  else renderQuiz();
}

init();
</script>
</body>
</html>
